<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Channel Demo Player</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>
<style>
  :root{
    --bg:#f5f6f8;
    --panel:#ffffff;
    --border:#e2e5ea;
    --text:#1a1d23;
    --muted:#6b7280;
    --accent:#2563eb;
    --green:#16a34a;
    --red:#dc2626;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding:16px;
  }
  .wrap{
    max-width:900px;
    margin:0 auto;
  }
  h1{
    font-size:18px;
    font-weight:600;
    margin:0 0 4px;
  }
  p.sub{
    margin:0 0 16px;
    color:var(--muted);
    font-size:13px;
  }
  .layout{
    display:flex;
    gap:16px;
    flex-wrap:wrap;
  }
  .player-col{
    flex:1 1 380px;
    min-width:280px;
  }
  .list-col{
    flex:1 1 260px;
    min-width:240px;
  }
  .player-box{
    position:relative;
    background:#000;
    border-radius:10px;
    overflow:hidden;
    border:1px solid var(--border);
  }
  video{
    width:100%;
    display:block;
    background:#000;
    aspect-ratio:16/9;
  }
  .spinner-overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:10px;
    color:#fff;
    font-size:13px;
  }
  .spinner-overlay.show{display:flex;}
  .spinner{
    width:34px;height:34px;
    border:3px solid rgba(255,255,255,0.25);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to { transform:rotate(360deg); } }
  .error-overlay{
    position:absolute;
    inset:0;
    background:rgba(20,20,20,0.85);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:8px;
    color:#fff;
    text-align:center;
    padding:20px;
  }
  .error-overlay.show{display:flex;}
  .error-overlay .msg{font-size:13px; color:#f3f4f6;}
  .retry-btn{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:7px 16px;
    border-radius:6px;
    font-size:12px;
    cursor:pointer;
  }
  .controls{
    background:var(--panel);
    border:1px solid var(--border);
    border-top:none;
    border-radius:0 0 10px 10px;
    padding:10px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
    font-size:12px;
  }
  .quality-group{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
  }
  button.q-btn{
    background:var(--bg);
    border:1px solid var(--border);
    color:var(--text);
    padding:5px 10px;
    border-radius:6px;
    font-size:12px;
    cursor:pointer;
  }
  button.q-btn.active{
    background:var(--accent);
    color:#fff;
    border-color:var(--accent);
  }
  .status{
    font-size:12px;
    color:var(--muted);
  }
  .save-toggle{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    color:var(--muted);
    margin:10px 0;
    background:var(--panel);
    border:1px solid var(--border);
    padding:8px 10px;
    border-radius:8px;
  }
  .channel-list{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
  }
  .channel-item{
    display:flex;
    align-items:center;
    gap:8px;
    padding:12px;
    border-bottom:1px solid var(--border);
    border-left:3px solid transparent;
    cursor:pointer;
    font-size:13px;
    transition:background 0.15s ease, border-left-color 0.15s ease;
  }
  .channel-item:last-child{border-bottom:none;}
  .channel-item:hover{background:var(--bg);}
  .channel-item.active{
    background:#eef2ff;
    border-left-color:var(--accent);
    font-weight:600;
  }
  .now-playing{
    font-size:9px;
    color:#fff;
    background:var(--accent);
    padding:2px 6px;
    border-radius:4px;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--muted);
    flex-shrink:0;
  }
  .dot.ok{background:var(--green);}
  .dot.fail{background:var(--red);}
  .ch-name{flex:1;}
  .ch-tag{
    font-size:10px;
    color:var(--muted);
    background:var(--bg);
    padding:2px 6px;
    border-radius:4px;
  }
  .log{
    margin-top:12px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 12px;
    font-size:11px;
    color:var(--muted);
    max-height:110px;
    overflow-y:auto;
    font-family:monospace;
  }
  @media (max-width:640px){
    .layout{flex-direction:column;}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Channel Demo Player</h1>
  <p class="sub">লিস্ট থেকে চ্যানেল সিলেক্ট করো। Low-data mode ডিফল্ট অন।</p>

  <div class="layout">
    <div class="player-col">
      <div class="player-box">
        <video id="video" controls playsinline></video>
        <div class="spinner-overlay" id="spinnerOverlay">
          <div class="spinner"></div>
          <div id="spinnerText">লোড হচ্ছে...</div>
        </div>
        <div class="error-overlay" id="errorOverlay">
          <div class="msg" id="errorMsg">এই চ্যানেল এখন চলছে না।</div>
          <button class="retry-btn" id="retryBtn">আবার চেষ্টা করো</button>
        </div>
      </div>
      <div class="controls">
        <div class="quality-group" id="qualityGroup">
          <span class="status">চ্যানেল সিলেক্ট করো</span>
        </div>
        <div class="status" id="statusText">Idle</div>
      </div>

      <label class="save-toggle">
        <input type="checkbox" id="dataSaver" checked>
        Low-data mode (ছোট quality দিয়ে শুরু হবে, মোবাইল কম গরম হবে)
      </label>

      <div class="log" id="log"></div>
    </div>

    <div class="list-col">
      <div class="channel-list" id="channelList"></div>
    </div>
  </div>
</div>

<script>
const CHANNELS = [
  { name: "Channel 1", url: "https://andro.evrenesoglu57.click/checklist/androstreamliveexn4.m3u8" },
  { name: "Channel 2", url: "https://pull.niues.live/live/stream-9912060_lhd.m3u8" },
  { name: "Channel 3", url: "https://deviantart.lovetier.bz/TSN3/tracks-v1a1/mono.m3u8" },
  { name: "Channel 4", url: "https://deviantart.lovetier.bz/TSN4/tracks-v1a1/mono.m3u8" },
  { name: "Channel 5", url: "https://tfxo0gr4uqmtt8y41hcjugwzdkpjpptwzc3jt.100ycdn.com/live1.streambylivepulse.com/live/channel16/playlist.m3u8" },
  { name: "Channel 6", url: "https://live01-cn-ali.bvjicd.com/live/79361366.m3u8" },
  { name: "Channel 7", url: "https://andro.226503.xyz/checklist/androstreamlivebs1.m3u8" },
  { name: "Channel 8", url: "https://sg1.livetv247.eu.cc/img/sg1.m3u8" },
  { name: "Channel 9", url: "https://nl1.livetv247.eu.cc/img/nl.m3u8" },
  { name: "Channel 10 (Dazn)", url: "https://fiveo4.vilevodules.uk/main/secure/40464a500b175347b1a89cc52e9b279e608b747c9b20c5f664d8e971e24a9969/1784148635/daznmundial-es.m3u8" },
  { name: "Channel 11 (beIN)", url: "https://fiveo4.vilevodules.uk/main/secure/1666f34d0b7fe74bf937fa9e29d903c7541e4f7b348dcdd25fa97cfad44aba9b/1784148859/beinsportsmax-sa.m3u8" },
  { name: "Channel 12", url: "https://tv.topmediatv.net:25463/live/TopMediaWeb/bOteTR8ED1/8631.m3u8" }
];

const video = document.getElementById('video');
const qualityGroup = document.getElementById('qualityGroup');
const statusText = document.getElementById('statusText');
const logBox = document.getElementById('log');
const channelListEl = document.getElementById('channelList');
const dataSaverBox = document.getElementById('dataSaver');
const spinnerOverlay = document.getElementById('spinnerOverlay');
const spinnerText = document.getElementById('spinnerText');
const errorOverlay = document.getElementById('errorOverlay');
const errorMsg = document.getElementById('errorMsg');
const retryBtn = document.getElementById('retryBtn');

let hls = null;
let activeIndex = -1;
let channelItems = [];

function showSpinner(text){
  spinnerText.textContent = text || 'লোড হচ্ছে...';
  spinnerOverlay.classList.add('show');
  errorOverlay.classList.remove('show');
}
function hideSpinner(){
  spinnerOverlay.classList.remove('show');
}
function showError(text){
  errorMsg.textContent = text || 'এই চ্যানেল এখন চলছে না।';
  errorOverlay.classList.add('show');
  spinnerOverlay.classList.remove('show');
}
function hideError(){
  errorOverlay.classList.remove('show');
}
retryBtn.onclick = () => {
  if (activeIndex >= 0) loadChannel(activeIndex);
};

function log(msg){
  const t = new Date().toLocaleTimeString();
  logBox.innerHTML += `[${t}] ${msg}<br>`;
  logBox.scrollTop = logBox.scrollHeight;
}

function buildList(){
  CHANNELS.forEach((ch, idx) => {
    const item = document.createElement('div');
    item.className = 'channel-item';
    item.innerHTML = `
      <span class="dot" id="dot-${idx}"></span>
      <span class="ch-name">${ch.name}</span>
      <span class="ch-tag" id="tag-${idx}">LIVE</span>
    `;
    item.onclick = () => loadChannel(idx);
    channelListEl.appendChild(item);
    channelItems.push(item);
  });
}

function setActiveItem(idx){
  channelItems.forEach((el, i) => {
    el.classList.remove('active');
    const tag = document.getElementById('tag-' + i);
    if (tag) { tag.textContent = 'LIVE'; tag.classList.remove('now-playing'); }
  });
  if (idx >= 0) {
    channelItems[idx].classList.add('active');
    const tag = document.getElementById('tag-' + idx);
    if (tag) { tag.textContent = '▶ Playing'; tag.classList.add('now-playing'); }
  }
}

function setDot(idx, state){
  const dot = document.getElementById('dot-' + idx);
  if (!dot) return;
  dot.classList.remove('ok','fail');
  if (state) dot.classList.add(state);
}

function loadChannel(idx){
  activeIndex = idx;
  setActiveItem(idx);
  const ch = CHANNELS[idx];
  statusText.textContent = "Connecting...";
  qualityGroup.innerHTML = '<span class="status">লোড হচ্ছে...</span>';
  log("Loading: " + ch.name);
  showSpinner('Connecting: ' + ch.name);
  hideError();

  if (hls) {
    hls.destroy();
    hls = null;
  }

  if (Hls.isSupported()) {
    hls = new Hls({
      capLevelToPlayerSize: false,
      maxBufferLength: 15,
      startLevel: 0,
      lowLatencyMode: true,
      liveSyncDurationCount: 1,
      liveMaxLatencyDurationCount: 3,
      maxLiveSyncPlaybackRate: 1.5,
      backBufferLength: 0
    });
    hls.loadSource(ch.url);
    hls.attachMedia(video);

    video.addEventListener('canplay', function jumpToLive() {
      if (video.duration && isFinite(video.duration)) {
        video.currentTime = video.duration - 0.5;
      }
      video.removeEventListener('canplay', jumpToLive);
    });

    if (window._syncInterval) clearInterval(window._syncInterval);
    window._syncInterval = setInterval(() => {
      if (!video.duration || !isFinite(video.duration)) return;
      const gap = video.duration - video.currentTime;
      if (gap > 6) {
        video.currentTime = video.duration - 1;
        log("Delay বেশি হয়ে গেছিলো, live edge এ জাম্প করা হলো");
      } else if (gap > 3) {
        video.playbackRate = 1.08;
      } else {
        video.playbackRate = 1.0;
      }
    }, 3000);

    hls.on(Hls.Events.MANIFEST_PARSED, function(event, data) {
      statusText.textContent = "Playing (144p locked): " + ch.name;
      setDot(idx, 'ok');
      log("Manifest loaded. Levels: " + data.levels.length);

      let lowestIdx = 0;
      let lowestHeight = Infinity;
      data.levels.forEach((lvl, i) => {
        const h = lvl.height || Infinity;
        if (h < lowestHeight) {
          lowestHeight = h;
          lowestIdx = i;
        }
      });
      hls.currentLevel = lowestIdx;
      hls.autoLevelCapping = lowestIdx;
      log("Locked to lowest level: index " + lowestIdx + " (" + (lowestHeight === Infinity ? "unknown" : lowestHeight + "p") + ")");

      buildQualityButtons(data.levels, lowestIdx);
      hideSpinner();
      video.play().catch(e => log("Tap play to start (autoplay blocked)."));
    });

    hls.on(Hls.Events.LEVEL_SWITCHED, function(event, data) {
      log("Quality switched to level " + data.level);
    });

    hls.on(Hls.Events.ERROR, function(event, data) {
      log("ERROR (" + ch.name + "): " + data.type + " - " + data.details);
      if (data.fatal) {
        statusText.textContent = "Failed: " + ch.name;
        setDot(idx, 'fail');
        showError('"' + ch.name + '" এখন চলছে না। লিংক dead অথবা ব্লকড হতে পারে।');
      }
    });

    video.addEventListener('waiting', () => showSpinner('Buffering...'));
    video.addEventListener('playing', () => hideSpinner());

  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = ch.url;
    statusText.textContent = "Playing (native): " + ch.name;
    setDot(idx, 'ok');
    qualityGroup.innerHTML = '<span class="status">Native player, auto quality</span>';
    video.addEventListener('canplay', () => hideSpinner(), { once:true });
    video.addEventListener('error', () => showError('"' + ch.name + '" এখন চলছে না।'));
  } else {
    statusText.textContent = "HLS not supported";
    setDot(idx, 'fail');
    showError('তোমার ব্রাউজার এই ফরম্যাট সাপোর্ট করে না।');
  }
}

function buildQualityButtons(levels, lockedIdx){
  qualityGroup.innerHTML = '';

  const lockLabel = document.createElement('span');
  lockLabel.className = 'q-btn active';
  if (levels.length === 0) {
    lockLabel.textContent = 'Locked (single quality)';
  } else {
    const lvl = levels[lockedIdx];
    const label = lvl.height ? lvl.height + 'p' : Math.round(lvl.bitrate/1000) + 'kbps';
    lockLabel.textContent = 'Locked: ' + label;
  }
  qualityGroup.appendChild(lockLabel);

  const note = document.createElement('span');
  note.className = 'status';
  note.textContent = 'Max resolution app এ lock করা, ইউজার পরিবর্তন করতে পারবে না';
  qualityGroup.appendChild(note);
}

function setActiveBtn(btn){
  document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

buildList();
</script>
</body>
</html>
